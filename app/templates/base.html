<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpotifyWebQuiz{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spotify: '#1DB954',
                        'spotify-dark': '#169c45',
                        'zinc-950': '#050505',
                    }
                }
            }
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-zinc-950 text-white min-h-screen font-sans antialiased selection:bg-spotify selection:text-black">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
