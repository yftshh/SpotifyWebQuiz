{% extends "base.html" %}

{% block title %}Game Arena - SpotifyWebQuiz{% endblock %}

{% block head %}
<meta name="spotify-token" content="{{ access_token }}">
<script type="application/json" id="game-data">
{
    "roundData": {{ round_data | tojson | safe }},
    "score": {{ round_data.score | tojson | safe }},
    "combo": {{ round_data.combo | tojson | safe }}
}
</script>
{% endblock %}

{% block content %}
<div id="game-app"
     x-data="gameApp()"
     x-init="initGame()"
     :class="{ 'fever-mode': feverMode }"
     class="min-h-screen flex flex-col relative overflow-hidden transition-all duration-500">

    <!-- Fever Mode Border Glow -->
    <div x-show="feverMode"
         x-transition
         class="fixed inset-0 pointer-events-none z-50 border-4 border-spotify/50 rounded-none"
         style="box-shadow: inset 0 0 60px rgba(29,185,84,0.3);"></div>

    <!-- Background ambient glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-spotify/5 rounded-full blur-[150px] pointer-events-none"></div>

    <!-- Top Bar -->
    <div class="relative z-10 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            <div>
                <div class="text-sm text-gray-400">Round <span x-text="roundData.round"></span>/<span x-text="roundData.total_rounds"></span></div>
                <div class="text-2xl font-black text-white tracking-tight" x-text="score"></div>
            </div>
        </div>

        <!-- Combo Indicator -->
        <div x-show="combo > 0" x-transition class="flex items-center gap-2">
            <div class="px-3 py-1 rounded-full bg-spotify/20 border border-spotify/40 text-spotify font-bold text-sm animate-pulse">
                <span x-text="combo + 'x Combo'"></span>
            </div>
            <div x-show="feverMode" class="text-spotify font-black text-sm uppercase tracking-wider animate-bounce">Fever!</div>
        </div>
    </div>

    <!-- Timer & Equalizer Circle -->
    <div class="relative z-10 flex justify-center mb-8">
        <div class="relative w-40 h-40">
            <!-- SVG Countdown Ring -->
            <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                <circle cx="50" cy="50" r="45" fill="none"
                        :stroke="panicMode ? '#d9f99d' : '#1DB954'"
                        stroke-width="4"
                        stroke-linecap="round"
                        stroke-dasharray="283"
                        :stroke-dashoffset="283 - (283 * timer / 15)"
                        class="transition-all duration-100"
                        :class="{ 'animate-pulse': panicMode }"
                        style="filter: drop-shadow(0 0 6px currentColor);"/>
            </svg>

            <!-- Center: Equalizer Bars -->
            <div class="absolute inset-0 flex items-center justify-center gap-1">
                <div class="eq-bar w-1.5 bg-spotify rounded-full transition-all"
                     :class="{ 'eq-animate': isPlaying, 'eq-panic': panicMode }"
                     style="height: 8px;"></div>
                <div class="eq-bar w-1.5 bg-spotify rounded-full transition-all"
                     :class="{ 'eq-animate': isPlaying, 'eq-panic': panicMode }"
                     style="height: 16px; animation-delay: 0.1s;"></div>
                <div class="eq-bar w-1.5 bg-spotify rounded-full transition-all"
                     :class="{ 'eq-animate': isPlaying, 'eq-panic': panicMode }"
                     style="height: 24px; animation-delay: 0.2s;"></div>
                <div class="eq-bar w-1.5 bg-spotify rounded-full transition-all"
                     :class="{ 'eq-animate': isPlaying, 'eq-panic': panicMode }"
                     style="height: 12px; animation-delay: 0.15s;"></div>
                <div class="eq-bar w-1.5 bg-spotify rounded-full transition-all"
                     :class="{ 'eq-animate': isPlaying, 'eq-panic': panicMode }"
                     style="height: 20px; animation-delay: 0.05s;"></div>
            </div>

            <!-- Timer Text -->
            <div class="absolute inset-0 flex items-end justify-center pb-2">
                <span class="text-xs font-mono font-bold"
                      :class="panicMode ? 'text-lime-300' : 'text-spotify'"
                      x-text="timer.toFixed(1) + 's'"></span>
            </div>
        </div>
    </div>

    <!-- Cards Grid -->
    <div class="relative z-10 flex-1 px-6 pb-8">
        <div class="max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-2 gap-4">
            <template x-for="option in roundData.options" :key="option.id">
                <button
                    @click="selectCard(option.id)"
                    :disabled="roundLocked"
                    class="group relative p-6 rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 text-left transition-all duration-300 hover:-translate-y-1 hover:border-spotify/30 hover:shadow-[0_0_20px_rgba(29,185,84,0.1)] disabled:cursor-default"
                    :class="{
                        'border-spotify bg-spotify/10 shadow-[0_0_30px_rgba(29,185,84,0.2)]': revealed && option.id === correctId,
                        'border-red-500 bg-red-500/10 shadow-[0_0_30px_rgba(239,68,68,0.2)] animate-shake': revealed && option.id === selectedId && option.id !== correctId,
                        'opacity-50': revealed && option.id !== correctId && option.id !== selectedId,
                        'scale-105': !roundLocked && hoveredId === option.id
                    }"
                    @mouseenter="hoveredId = option.id"
                    @mouseleave="hoveredId = null">

                    <!-- Album Cover (hidden until reveal) -->
                    <div class="relative w-full aspect-square mb-4 rounded-xl overflow-hidden bg-zinc-900">
                        <img :src="getCoverForOption(option.id)"
                             class="w-full h-full object-cover transition-all duration-700"
                             :class="revealed ? 'blur-0 scale-100' : 'blur-xl scale-110'">
                        <div x-show="!revealed" class="absolute inset-0 bg-zinc-800/50 flex items-center justify-center">
                            <svg class="w-12 h-12 text-white/20" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                        </div>
                    </div>

                    <h3 class="font-bold text-lg text-white mb-1" x-text="option.name"></h3>
                    <p class="text-sm text-gray-400" x-text="option.artist"></p>

                    <!-- Correct indicator -->
                    <div x-show="revealed && option.id === correctId" class="absolute top-3 right-3">
                        <div class="w-8 h-8 rounded-full bg-spotify flex items-center justify-center">
                            <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Wrong indicator -->
                    <div x-show="revealed && option.id === selectedId && option.id !== correctId" class="absolute top-3 right-3">
                        <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </div>
                    </div>
                </button>
            </template>
        </div>
    </div>

    <!-- Result Overlay (during freeze) -->
    <div x-show="showResultOverlay" x-transition.opacity class="fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="text-center">
            <div x-show="lastResult.correct" class="mb-4">
                <div class="text-6xl mb-2">🎉</div>
                <div class="text-3xl font-black text-spotify">Correct!</div>
                <div class="text-xl text-white mt-2">+<span x-text="lastResult.points"></span> pts</div>
            </div>
            <div x-show="!lastResult.correct" class="mb-4">
                <div class="text-6xl mb-2">❌</div>
                <div class="text-3xl font-black text-red-500">Wrong!</div>
                <div class="text-gray-300 mt-2" x-text="lastResult.track_name + ' — ' + lastResult.artist_name"></div>
            </div>
            <div class="text-sm text-gray-400 animate-pulse">Next round starting...</div>
        </div>
    </div>

    <!-- SDK Error Toast -->
    <div x-show="sdkError" x-transition class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full bg-red-500/20 border border-red-500/50 text-red-300 text-sm">
        <span x-text="sdkError"></span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
function gameApp() {
    return {
        // State
        roundData: JSON.parse(document.getElementById('game-data').textContent).roundData,
        score: JSON.parse(document.getElementById('game-data').textContent).score,
        combo: JSON.parse(document.getElementById('game-data').textContent).combo,
        timer: 15.0,
        isPlaying: false,
        roundLocked: false,
        revealed: false,
        correctId: null,
        selectedId: null,
        hoveredId: null,
        feverMode: false,
        panicMode: false,
        showResultOverlay: false,
        lastResult: {},
        sdkError: null,
        deviceId: null,
        player: null,
        token: document.querySelector('meta[name="spotify-token"]').getAttribute('content'),
        timerInterval: null,
        stateCheckInterval: null,
        roundStartTime: 0,

        initGame() {
            this.initSpotifyPlayer();
            this.startRoundTimer();
        },

        initSpotifyPlayer() {
            window.onSpotifyWebPlaybackSDKReady = () => {
                this.player = new Spotify.Player({
                    name: 'SpotifyWebQuiz Player',
                    getOAuthToken: cb => { cb(this.token); },
                    volume: 0.5
                });

                this.player.addListener('ready', ({ device_id }) => {
                    this.deviceId = device_id;
                    // Safe timeout before first playback
                    setTimeout(() => {
                        this.playTrack();
                    }, 1000);
                });

                this.player.addListener('not_ready', ({ device_id }) => {
                    this.sdkError = 'Player went offline. Please refresh.';
                });

                this.player.addListener('initialization_error', ({ message }) => {
                    this.sdkError = 'Init error: ' + message;
                });

                this.player.addListener('authentication_error', ({ message }) => {
                    this.sdkError = 'Auth error: ' + message;
                    // Try refreshing token
                    this.refreshToken();
                });

                this.player.addListener('playback_error', ({ message }) => {
                    this.sdkError = 'Playback error: ' + message;
                });

                this.player.addListener('player_state_changed', state => {
                    this.isPlaying = state && !state.paused;
                });

                this.player.connect();

                // Poll for state changes as fallback
                this.stateCheckInterval = setInterval(async () => {
                    const state = await this.player.getCurrentState();
                    this.isPlaying = state && !state.paused;
                }, 500);
            };
        },

        async playTrack() {
            if (!this.deviceId || !this.roundData.target_uri) return;
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + this.deviceId, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + this.token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ uris: [this.roundData.target_uri] })
                });
                if (response.status === 401) {
                    await this.refreshToken();
                    // Retry once
                    await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + this.deviceId, {
                        method: 'PUT',
                        headers: {
                            'Authorization': 'Bearer ' + this.token,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ uris: [this.roundData.target_uri] })
                    });
                }
                this.roundStartTime = Date.now();
            } catch (err) {
                this.sdkError = 'Failed to start playback: ' + err.message;
            }
        },

        async refreshToken() {
            try {
                const res = await fetch('/api/refresh-token', { method: 'POST' });
                const data = await res.json();
                this.token = data.access_token;
                // Update meta tag for future rounds
                document.querySelector('meta[name="spotify-token"]').setAttribute('content', this.token);
            } catch (err) {
                this.sdkError = 'Token refresh failed. Please re-login.';
            }
        },

        startRoundTimer() {
            this.timer = 15.0;
            this.panicMode = false;
            if (this.timerInterval) clearInterval(this.timerInterval);

            this.timerInterval = setInterval(() => {
                if (this.roundLocked) return;
                this.timer -= 0.1;

                if (this.timer <= 4.0 && !this.panicMode) {
                    this.panicMode = true;
                }

                if (this.timer <= 0) {
                    this.timer = 0;
                    clearInterval(this.timerInterval);
                    this.handleTimeout();
                }
            }, 100);
        },

        async selectCard(choiceId) {
            if (this.roundLocked) return;
            this.roundLocked = true;
            this.selectedId = choiceId;
            clearInterval(this.timerInterval);

            // Pause playback immediately
            if (this.player) {
                await this.player.pause();
            }

            const elapsed = Math.min(15000, Date.now() - this.roundStartTime);

            try {
                const res = await fetch('/api/check-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        choice_id: choiceId,
                        elapsed_ms: elapsed
                    })
                });
                const data = await res.json();
                this.handleResult(data);
            } catch (err) {
                this.sdkError = 'Failed to validate answer.';
                this.roundLocked = false;
            }
        },

        async handleTimeout() {
            this.roundLocked = true;
            if (this.player) {
                await this.player.pause();
            }
            // Send empty choice to record timeout
            try {
                const res = await fetch('/api/check-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        choice_id: '',
                        elapsed_ms: 15000
                    })
                });
                const data = await res.json();
                this.handleResult(data);
            } catch (err) {
                this.sdkError = 'Timeout handling failed.';
            }
        },

        handleResult(data) {
            this.revealed = true;
            this.correctId = data.correct_id;
            this.score = data.total_score;
            this.combo = data.combo;
            this.feverMode = data.fever_mode;
            this.lastResult = data;
            this.showResultOverlay = true;

            // 3-second freeze before next round
            setTimeout(() => {
                if (data.game_over) {
                    window.location.href = '/results';
                } else {
                    this.loadNextRound();
                }
            }, 3000);
        },

        async loadNextRound() {
            this.showResultOverlay = false;
            this.revealed = false;
            this.correctId = null;
            this.selectedId = null;
            this.roundLocked = false;
            this.panicMode = false;

            try {
                const res = await fetch('/api/next-round');
                const data = await res.json();
                if (data.game_over) {
                    window.location.href = '/results';
                    return;
                }
                this.roundData = data;
                this.startRoundTimer();
                this.playTrack();
            } catch (err) {
                this.sdkError = 'Failed to load next round.';
            }
        },

        getCoverForOption(optionId) {
            // Only reveal cover for correct answer or selected wrong answer after reveal
            if (!this.revealed) {
                return '';
            }
            if (this.lastResult.correct_id === optionId) {
                return this.lastResult.album_cover || '';
            }
            if (this.selectedId === optionId && !this.lastResult.correct) {
                return this.lastResult.album_cover || '';
            }
            return '';
        }
    };
}
</script>
{% endblock %}
