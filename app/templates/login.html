{% extends "base.html" %}

{% block title %}Login - SpotifyWebQuiz{% endblock %}

{% block content %}
<div class="relative min-h-screen flex items-center justify-center overflow-hidden">
    <!-- Animated background gradient orbs -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-spotify/20 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 1s;"></div>

    <div class="relative z-10 text-center px-6">
        <div class="mb-8">
            <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-gradient-to-br from-spotify to-emerald-400 flex items-center justify-center shadow-[0_0_40px_rgba(29,185,84,0.4)] animate-bounce">
                <svg class="w-12 h-12 text-black" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
            </div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tight mb-4 bg-gradient-to-r from-white via-spotify to-emerald-400 bg-clip-text text-transparent select-none pb-2 leading-normal">
                SpotifyWebQuiz
            </h1>
            <p class="text-xl text-gray-400 max-w-lg mx-auto leading-relaxed">
                Test your musical intuition. Listen, guess, and climb the leaderboard with style.
            </p>
        </div>

        <a href="/login"
           class="group inline-flex items-center gap-3 px-8 py-4 bg-spotify hover:bg-spotify-dark text-black font-bold text-lg rounded-full transition-all duration-300 shadow-[0_0_30px_rgba(29,185,84,0.3)] hover:shadow-[0_0_50px_rgba(29,185,84,0.5)] hover:scale-105">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
            </svg>
            Login with Spotify
        </a>
    </div>
</div>
{% endblock %}
