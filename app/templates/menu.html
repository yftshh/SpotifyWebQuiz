{% extends "base.html" %}

{% block title %}Menu - SpotifyWebQuiz{% endblock %}

{% block content %}
<div class="relative min-h-screen flex items-center justify-center overflow-hidden">
    <div class="absolute top-0 left-0 w-96 h-96 bg-spotify/20 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-emerald-500/10 rounded-full blur-[120px] animate-pulse" style="animation-delay: 1s;"></div>

    <div class="relative z-10 text-center px-6 w-full max-w-md">
        <div class="mb-10">
            <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-2 bg-gradient-to-r from-white via-spotify to-emerald-400 bg-clip-text text-transparent select-none pb-2 leading-normal">
                SpotifyWebQuiz
            </h1>
            <p class="text-lg text-gray-400">Welcome, <span class="text-spotify font-semibold">{{ player_name }}</span>!</p>
        </div>

        <div class="space-y-4">
            <a href="/"
               class="group block w-full px-8 py-5 bg-spotify hover:bg-spotify-dark text-black font-bold text-xl rounded-2xl transition-all duration-300 shadow-[0_0_30px_rgba(29,185,84,0.3)] hover:shadow-[0_0_50px_rgba(29,185,84,0.5)] hover:scale-105">
                <div class="flex items-center justify-center gap-3">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    Play
                </div>
            </a>

            <a href="/leaderboard"
               class="group block w-full px-8 py-5 bg-gray-800 hover:bg-gray-700 text-white font-bold text-xl rounded-2xl transition-all duration-300 border border-gray-700 hover:border-spotify/50 hover:scale-105">
                <div class="flex items-center justify-center gap-3">
                    <svg class="w-7 h-7 text-spotify" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Leaderboard
                </div>
            </a>

            <a href="/logout"
               class="group block w-full px-8 py-3 bg-transparent hover:bg-red-500/10 text-gray-400 hover:text-red-400 font-semibold text-lg rounded-2xl transition-all duration-300 border border-gray-800 hover:border-red-500/30">
                Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
